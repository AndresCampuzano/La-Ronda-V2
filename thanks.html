<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you · La Ronda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* página simple centrada */
        .thanks-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            background-color: var(--ivory);
        }
        .thanks-wrap img { height: 90px; margin-bottom: 24px; }
        .thanks-wrap h1 { font-size: 40px; margin-bottom: 12px; }
        .thanks-wrap p { max-width: 460px; }
        .thanks-wrap .kr { margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="thanks-wrap">
        <img src="https://flgwtpu6ecosr1ha.public.blob.vercel-storage.com/logo.png" alt="La Ronda">
        <h1>Thank you for joining La Ronda 🧉</h1>
        <p class="en">We received your order request and will contact you soon to confirm.</p>
        <p class="kr">La Ronda에 함께해주셔서 감사합니다. 주문 확인을 위해 곧 연락드리겠습니다.</p>
        <a href="index.html" class="btn first" style="border:1px solid var(--wood); color:var(--mate-brown);">← Back to home · 홈으로</a>
    </div>
</body>
</html>
